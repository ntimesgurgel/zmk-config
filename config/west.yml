manifest:
    remotes:
      - name: zmkfirmware
        url-base: https://github.com/zmkfirmware
      - name: ntimesgurgel
        url-base: https://github.com/ntimesgurgel
    projects:
      - name: zmk
        remote: zmkfirmware
        revision: main   
        import: app/west.yml
    
      - name: zmk-config
        remote: ntimesgurgel
        revision: main
    self:
      path: config