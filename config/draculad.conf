# Bluetooth
CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_CENTRAL=y

# Split
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# Studio
CONFIG_ZMK_STUDIO=n

# USB
CONFIG_USB_DEVICE_STACK=y

# Battery
CONFIG_ZMK_BATTERY_REPORTING=y

# Encoders
CONFIG_EC11=y

# Power
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=900000

# Logging
CONFIG_LOG=y
CONFIG_ZMK_LOG_LEVEL_INF=y